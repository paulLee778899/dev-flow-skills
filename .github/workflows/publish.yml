name: Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org

      - name: Check CLI syntax
        run: |
          node --check bin/dev-flow.mjs
          node --check scripts/install-dev-flow.mjs
          node --check scripts/update-dev-flow.mjs

      - name: Verify Claude install and doctor
        run: |
          tmpdir="$(mktemp -d)"
          node bin/dev-flow.mjs install-claude --target "$tmpdir/skills" --commands-target "$tmpdir/commands/dev-flow.md"
          node bin/dev-flow.mjs doctor-claude --target "$tmpdir/skills" --commands-target "$tmpdir/commands/dev-flow.md"
          test -L "$tmpdir/commands/dev-flow.md"
          test -L "$tmpdir/skills/dev-flow-master"

      - name: Check package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --access public
